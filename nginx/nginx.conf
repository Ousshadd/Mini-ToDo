upstream auth_api {
    server auth-api:3001;
}

upstream user_service {
    server user-service:3002;
}

upstream todo_service {
    server todo-service:3003;
}

upstream category_service {
    server category-service:3004;
}

upstream comment_service {
    server comment-service:3005;
}

upstream statistics_service {
    server statistics-service:3006;
}

upstream notification_service {
    server notification-service:3007;
}

upstream frontend {
    server frontend:4000;
}

server {
    listen 80;
    server_name localhost;

    # Auth API
    location /api/auth {
        rewrite ^/api/auth/?(.*) /$1 break;
        proxy_pass http://auth_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User Service
    location /api/users {
        rewrite ^/api/users/?(.*) /$1 break;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Todo Service
    location /api/todos {
        rewrite ^/api/todos/?(.*) /$1 break;
        proxy_pass http://todo_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Category Service
    location /api/categories {
        rewrite ^/api/categories/?(.*) /$1 break;
        proxy_pass http://category_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Comment Service (PostgreSQL)
    location /api/comments {
        rewrite ^/api/comments/?(.*) /$1 break;
        proxy_pass http://comment_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Statistics Service (Python/FastAPI)
    location /api/statistics {
        rewrite ^/api/statistics/?(.*) /$1 break;
        proxy_pass http://statistics_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Notification Service (Python/FastAPI + Redis)
    location /api/notifications {
        rewrite ^/api/notifications/?(.*) /$1 break;
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Angular SSR)
    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
