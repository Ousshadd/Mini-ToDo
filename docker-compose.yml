version: '3.8'

services:
  # ========================
  # DATABASE
  # ========================
  mongodb:
    image: mongo:7
    container_name: mini-todo-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mini-todo-network
    restart: unless-stopped

  postgres-comments:
    image: postgres:17-alpine
    container_name: mini-todo-postgres-comments
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=comments_db
      - POSTGRES_USER=mini_todo
      - POSTGRES_PASSWORD=mini_todo_password
    volumes:
      - comments_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_todo -d comments_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mini-todo-network
    restart: unless-stopped

  redis-notifications:
    image: redis:7-alpine
    container_name: mini-todo-redis-notifications
    ports:
      - "6379:6379"
    volumes:
      - notifications_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mini-todo-network
    restart: unless-stopped

  # ========================
  # BACKEND MICROSERVICES
  # ========================
  auth-api:
    build:
      context: ./backend/auth-api
      dockerfile: Dockerfile
    container_name: mini-todo-auth-api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongodb:27017/auth_db
      - JWT_SECRET=mini_todo_secret_key_2024
    depends_on:
      - mongodb
    networks:
      - mini-todo-network
    restart: unless-stopped

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: mini-todo-user-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongodb:27017/user_db
      - JWT_SECRET=mini_todo_secret_key_2024
    depends_on:
      - mongodb
    networks:
      - mini-todo-network
    restart: unless-stopped

  todo-service:
    build:
      context: ./backend/todo-service
      dockerfile: Dockerfile
    container_name: mini-todo-todo-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://mongodb:27017/todo_db
      - JWT_SECRET=mini_todo_secret_key_2024
    depends_on:
      - mongodb
    networks:
      - mini-todo-network
    restart: unless-stopped

  category-service:
    build:
      context: ./backend/category-service
      dockerfile: Dockerfile
    container_name: mini-todo-category-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGO_URI=mongodb://mongodb:27017/category_db
      - JWT_SECRET=mini_todo_secret_key_2024
    depends_on:
      - mongodb
    networks:
      - mini-todo-network
    restart: unless-stopped

  comment-service:
    build:
      context: ./backend/comment-service
      dockerfile: Dockerfile
    container_name: mini-todo-comment-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - DATABASE_URL=postgresql://mini_todo:mini_todo_password@postgres-comments:5432/comments_db
      - JWT_SECRET=mini_todo_secret_key_2024
      - TODO_SERVICE_URL=http://todo-service:3003
    depends_on:
      postgres-comments:
        condition: service_healthy
      todo-service:
        condition: service_started
    networks:
      - mini-todo-network
    restart: unless-stopped

  statistics-service:
    build:
      context: ./backend/statistics-service
      dockerfile: Dockerfile
    container_name: mini-todo-statistics-service
    ports:
      - "3006:3006"
    environment:
      - JWT_SECRET=mini_todo_secret_key_2024
      - TODO_SERVICE_URL=http://todo-service:3003
      - CATEGORY_SERVICE_URL=http://category-service:3004
    depends_on:
      - todo-service
      - category-service
    networks:
      - mini-todo-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: mini-todo-notification-service
    ports:
      - "3007:3007"
    environment:
      - JWT_SECRET=mini_todo_secret_key_2024
      - TODO_SERVICE_URL=http://todo-service:3003
      - REDIS_URL=redis://redis-notifications:6379/0
    depends_on:
      redis-notifications:
        condition: service_healthy
      todo-service:
        condition: service_started
    networks:
      - mini-todo-network
    restart: unless-stopped

  # ========================
  # FRONTEND
  # ========================
  frontend:
    build:
      context: ./frontend/toDo
      dockerfile: Dockerfile
    container_name: mini-todo-frontend
    ports:
      - "4000:4000"
    environment:
      - NG_ALLOWED_HOSTS=localhost
      - ALLOWED_HOSTS=localhost
    depends_on:
      - auth-api
      - user-service
      - todo-service
      - category-service
      - comment-service
      - statistics-service
      - notification-service
    networks:
      - mini-todo-network
    restart: unless-stopped

  # ========================
  # API GATEWAY
  # ========================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: mini-todo-nginx
    ports:
      - "80:80"
    depends_on:
      - auth-api
      - user-service
      - todo-service
      - category-service
      - comment-service
      - statistics-service
      - notification-service
      - frontend
    networks:
      - mini-todo-network
    restart: unless-stopped

# ========================
# NETWORK & VOLUMES
# ========================
networks:
  mini-todo-network:
    driver: bridge

volumes:
  mongo_data:
  comments_data:
  notifications_data:
